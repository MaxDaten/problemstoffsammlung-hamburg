name: CI & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege by default; jobs widen only what they need.
permissions:
  contents: read

# One run per ref; cancel superseded PR runs, never cancel a main deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write        # configure-pages (push only)
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build site (inject data.json into index.html)
        run: python3 build.py
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: UAT — built site (runs on every push and pull request)
        run: |
          python3 -m http.server 8080 --directory _site &
          for i in $(seq 1 30); do curl -sf http://localhost:8080/index.html >/dev/null && break; sleep 0.5; done
          curl -sf http://localhost:8080/index.html >/dev/null || { echo "::error::built site did not start on :8080"; exit 1; }
          node uat/run.mjs "http://localhost:8080/index.html"
      # Pages artifact is only needed for an actual deploy (push to main).
      - uses: actions/configure-pages@v6
        if: github.event_name == 'push'
      - uses: actions/upload-pages-artifact@v5
        if: github.event_name == 'push'
        with:
          path: _site

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  uat-post:
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: UAT — post-deploy smoke (live site)
        env:
          UAT_URL: ${{ needs.deploy.outputs.page_url }}
        run: node uat/run.mjs "$UAT_URL"
