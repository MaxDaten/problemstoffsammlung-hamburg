version: 2
updates:
  # GitHub Actions used by the deploy/UAT workflow
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns: ["*"]

  # npm dev dependencies (Playwright for the UAT)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    groups:
      npm:
        patterns: ["*"]
